name: Garmin sync

on:
  schedule:
    - cron: '17 * * * *'   # hourly, at :17
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r sync/requirements.txt

      - name: Pull rides from Garmin
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
        run: python sync/garmin_sync.py

      - name: Commit updated rides.json
        run: |
          git config user.name  "garmin-sync-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rides.json
          if git diff --cached --quiet; then
            echo "No ride changes."
          else
            git commit -m "Sync Garmin rides"
            git push
          fi
